name: Sync Ruleset

on:
  schedule:
    - cron: '0 2 * * *' # 每天凌晨 2 点自动运行
  workflow_dispatch:      # 允许手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Convert YAML to Classical List
        run: |
          # 1. 获取原始数据并流式处理
          # 2. 移除 payload 标记、单引号、行首横杠和空格
          # 3. 通过 awk 识别 +. 转换为 DOMAIN-SUFFIX，其余转换为 DOMAIN
          
          curl -sSL https://raw.githubusercontent.com/Loyalsoldier/clash-rules/refs/heads/release/direct.txt | \
          sed "s/'//g; s/^[[:space:]]*- //g; /payload:/d; /^$/d" | \
          awk '{
            if ($0 ~ /^\+\./) {
              # 如果是 +. 开头，去掉 +. 并加 DOMAIN-SUFFIX
              sub(/^\+\./, "", $0);
              print "DOMAIN-SUFFIX," $0
            } else {
              # 普通域名加 DOMAIN
              print "DOMAIN," $0
            }
          }' > direct.list

      - name: Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add direct.list
          # 只有在内容有变化时才提交
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update: convert to classical list" && git push)
